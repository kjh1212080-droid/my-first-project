<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전관리실 통합 자료실 및 대시보드 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #0d6efd; border-bottom: 3px solid #0d6efd; padding-bottom: 12px; margin-bottom: 25px; font-size: 26px; }
        
        /* 🎛️ 상단 통계 대시보드 구역 */
        .dashboard-grid { display: block; margin-bottom: 25px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; }
        .chart-container { width: 100%; max-width: 500px; margin: 0 auto; height: 260px; }
        .summary-box { text-align: center; padding: 15px; background: #e9ecef; border-radius: 6px; margin-bottom: 15px; font-size: 16px; }
        .summary-box span { font-weight: bold; color: #0d6efd; font-size: 18px; }

        /* 🔍 검색 및 필터 구역 */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; background: #0d6efd; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
        select, input, button { padding: 12px; font-size: 15px; border: 1px solid #ced4da; border-radius: 6px; }
        input { flex: 1; min-width: 250px; }
        button { background-color: #212529; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #424649; }

        /* 📅 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        th { background-color: #f1f3f5; color: #495057; font-weight: bold; }
        tr:hover { background-color: #f8f9fa; }
        
        /* 🏷️ 부서별 태그 색상 정의 */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; display: inline-block; }
        .bg-safety { background-color: #6f42c1; } /* 안전관리실 (보라) */
        .bg-west { background-color: #fd7e14; }   /* 서부안전팀 (주황) */
        .bg-north { background-color: #0dcaf0; color: #212529; }  /* 북부안전팀 (하늘) */
        
        /* 👁️ PDF 보기 버튼 */
        .view-btn { background-color: #198754; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .view-btn:hover { background-color: #157347; }

        /* 📄 PDF 뷰어 구역 */
        .pdf-viewer-container { margin-top: 40px; display: none; border-top: 2px dashed #ced4da; padding-top: 20px; }
        .pdf-viewer-container h3 { color: #198754; margin-bottom: 15px; }
        iframe { width: 100%; height: 750px; border: 1px solid #ced4da; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 안전관리실 통합 자료실 및 대시보드 시스템</h1>
    
    <div class="dashboard-grid">
        <div class="summary-box">
            📊 현재 검색 조건에 따른 데이터 요약: 총 <span id="totalCount">0</span>건 
            (안전관리실: <span id="countSafety">0</span>건 | 
            서부안전팀: <span id="countWest">0</span>건 | 
            북부안전팀: <span id="countNorth">0</span>건)
        </div>
        <div class="chart-container">
            <canvas id="departmentChart"></canvas>
        </div>
    </div>

    <div class="search-box">
        <select id="deptSelect">
            <option value="all">전체 부서 카테고리</option>
            <option value="안전관리실">안전관리실</option>
            <option value="서부안전팀">서부안전팀</option>
            <option value="북부안전팀">북부안전팀</option>
        </select>
        <input type="text" id="searchInput" placeholder="부서명, 자료명 또는 키워드를 입력하세요 (예: 북부안전팀 차량, 아차사고, PPT...)">
        <button onclick="searchData()">🔍 통합 검색 및 시각화</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">담당 부서</th>
                <th style="width: 30%;">자료 및 현황 항목명</th>
                <th style="width: 42%;">상세 내용 설명</th>
                <th style="width: 13%;">자료 보기</th>
            </tr>
        </thead>
        <tbody id="dataTableBody">
            </tbody>
    </table>

    <div id="pdfViewerContainer" class="pdf-viewer-container">
        <h3 id="pdfTitle">📄 자료 미리보기</h3>
        <iframe id="pdfFrame" src=""></iframe>
    </div>
</div>

<script>
    // 💡 실제 데이터베이스 공간 (여기에 행을 자유롭게 추가하시면 됩니다)
    const safetyDatabase = [
        { dept: "안전관리실", title: "2026년 안전관리실 현황", content: "안전관리실의 종합 현황 및 마스터 플랜을 볼 수 있는 핵심 자료입니다.", fileName: "safety_guide.pdf" },
        { dept: "서부안전팀", title: "정압기 교육 PPT 자료", content: "현장 작업자 필수 이수 기술 매뉴얼 및 안전 작동 슬라이드", fileName: "prod_safety.pdf" },
        { dept: "북부안전팀", title: "아차사고/사고 가이드라인", content: "북부안전팀 관할 지역 내 사고 발생 시 대처 가이드 라인 제시 자료", fileName: "space_guide.pdf" },
        { dept: "북부안전팀", title: "북부안전팀 차량 운행 안전수칙", content: "현장 순찰 및 업무용 차량 운행 전 점검 리스트 및 안전 운전 매뉴얼 PDF", fileName: "safety_guide.pdf" },
        { dept: "북부안전팀", title: "북부 관할 특수 차량 장비 점검표", content: "차량 탑재 장비 및 안전보호구 보유 현황 통계 자료", fileName: "safety_guide.pdf" }
    ];

    let myChart = null; // 그래프 객체를 담을 변수

    // 부서별 태그 색상 클래스 가져오기
    function getDeptBadgeClass(dept) {
        if (dept === "안전관리실") return "bg-safety";
        if (dept === "서부안전팀") return "bg-west";
        if (dept === "북부안전팀") return "bg-north";
        return "bg-secondary";
    }

    // 📊 그래프 및 요약 표를 새로 그려주는 함수
    function updateDashboard(dataList) {
        // 1. 부서별 개수 계산
        const counts = { "안전관리실": 0, "서부안전팀": 0, "북부안전팀": 0 };
        dataList.forEach(item => {
            if (counts[item.dept] !== undefined) {
                counts[item.dept]++;
            }
        });

        // 2. 상단 텍스트 요약 숫자 반영
        document.getElementById("totalCount").innerText = dataList.length;
        document.getElementById("countSafety").innerText = counts["안전관리실"];
        document.getElementById("countWest").innerText = counts["서부안전팀"];
        document.getElementById("countNorth").innerText = counts["북부안전팀"];

        // 3. Chart.js 그래프 업데이트 혹은 신규 생성
        const ctx = document.getElementById('departmentChart').getContext('2d');
        
        if (myChart) {
            // 이미 그래프가 있으면 데이터만 교체
            myChart.data.datasets[0].data = [counts["안전관리실"], counts["서부안전팀"], counts["북부안전팀"]];
            myChart.update();
        } else {
            // 처음 실행 시 그래프 생성
            myChart = new Chart(ctx, {
                type: 'bar', // 막대 그래프 형태 (원형을 원하시면 'pie'나 'doughnut'으로 변경 가능)
                data: {
                    labels: ['안전관리실', '서부안전팀', '북부안전팀'],
                    datasets: [{
                        label: '검색된 자료 건수',
                        data: [counts["안전관리실"], counts["서부안전팀"], counts["북부안전팀"]],
                        backgroundColor: ['#6f42c1', '#fd7e14', '#0dcaf0'],
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    },
                    plugins: {
                        legend: { display: false } // 상단 범례 숨김
                    }
                }
            });
        }
    }

    // 📅 테이블 리스트 화면에 출력 함수
    function displayData(dataList) {
        const tableBody = document.getElementById("dataTableBody");
        tableBody.innerHTML = "";
        
        if(dataList.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999; padding:40px;">🔍 일치하는 검색 결과 자료가 없습니다. 다른 키워드를 입력해 보세요.</td></tr>`;
            return;
        }

        dataList.forEach(item => {
            const badgeClass = getDeptBadgeClass(item.dept);
            const row = `<tr>
                <td><span class="badge ${badgeClass}">${item.dept}</span></td>
                <td><strong>${item.title}</strong></td>
                <td>${item.content}</td>
                <td><button class="view-btn" onclick="openPdf('${item.fileName}', '${item.title}')">문서 열기 👁️</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // 📄 PDF 여는 함수
    function openPdf(fileName, title) {
        const container = document.getElementById("pdfViewerContainer");
        const frame = document.getElementById("pdfFrame");
        const titleTarget = document.getElementById("pdfTitle");

        titleTarget.innerText = `📄 부서 자료 미리보기: ${title}`;
        frame.src = fileName;
        container.style.display = "block";
        container.scrollIntoView({ behavior: 'smooth' });
    }

    // 🔍 부서 및 키워드 연동 검색 함수
    function searchData() {
        const selectedDept = document.getElementById("deptSelect").value;
        const searchKeyword = document.getElementById("searchInput").value.toLowerCase().trim();

        const filteredData = safetyDatabase.filter(item => {
            // 부서 필터링 조건
            const matchDept = (selectedDept === "all" || item.dept === selectedDept);
            
            // 키워드 필터링 조건 (부서명, 제목, 상세내용을 모두 검색)
            const matchKeyword = item.dept.toLowerCase().includes(searchKeyword) || 
                                 item.title.toLowerCase().includes(searchKeyword) || 
                                 item.content.toLowerCase().includes(searchKeyword);
            
            return matchDept && matchKeyword;
        });

        // 결과 화면 출력 및 대시보드 차트 실시간 갱신
        displayData(filteredData);
        updateDashboard(filteredData);
    }

    // 초기 실행 시 전체 데이터 및 차트 세팅
    displayData(safetyDatabase);
    updateDashboard(safetyDatabase);
</script>

</body>
</html>
