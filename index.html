<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>안전관리실 전사 통합 스마트 검색 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #0d6efd; border-bottom: 3px solid #0d6efd; padding-bottom: 12px; margin-bottom: 25px; font-size: 26px; }
        
        /* 🔍 통합 검색 바 스타일 */
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; background: #0d6efd; padding: 18px; border-radius: 8px; }
        select, input, button { padding: 12px; font-size: 15px; border: 1px solid #ced4da; border-radius: 6px; }
        input { flex: 1; min-width: 250px; }
        button { background-color: #212529; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #424649; }

        /* 📊 스마트 통계 분석 리포트 레이아웃 */
        .stats-report-container { display: none; background: #fff; border: 2px solid #0d6efd; border-radius: 10px; padding: 25px; margin-bottom: 25px; animation: fadeIn 0.5s ease; }
        .stats-title { color: #0d6efd; margin-top: 0; font-size: 20px; border-bottom: 1px solid #e9ecef; padding-bottom: 10px; }
        .stats-grid { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 15px; }
        .stats-table-box { flex: 1; min-width: 300px; }
        .stats-chart-box { flex: 1; min-width: 300px; max-width: 400px; height: 250px; position: relative; }
        
        /* 통계용 미니 테이블 */
        .mini-table { width: 100%; border-collapse: collapse; background: #f8f9fa; }
        .mini-table th, .mini-table td { padding: 10px; text-align: center; border: 1px solid #dee2e6; font-size: 14px; }
        .mini-table th { background-color: #e9ecef; font-weight: bold; }
        .highlight-tr { background-color: #e8f4ff; font-weight: bold; color: #0d6efd; }

        /* 일반 자료 리스트 테이블 */
        table.data-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        table.data-table th, table.data-table td { padding: 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
        table.data-table th { background-color: #f1f3f5; color: #495057; font-weight: bold; }
        table.data-table tr:hover { background-color: #f8f9fa; }
        
        /* 부서 뱃지 색상 정의 */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; display: inline-block; }
        .bg-team1 { background-color: #20c997; } /* 경산 */
        .bg-team2 { background-color: #fd7e14; } /* 서부 */
        .bg-team3 { background-color: #0dcaf0; color: #212529; } /* 북부 */
        .bg-team4 { background-color: #0d6efd; } /* 수성 */
        .bg-team5 { background-color: #6f42c1; } /* 배관진단 */
        
        .view-btn { background-color: #198754; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .view-btn:hover { background-color: #157347; }

        .pdf-viewer-container { margin-top: 30px; display: none; border-top: 2px dashed #ced4da; padding-top: 20px; }
        iframe { width: 100%; height: 750px; border: 1px solid #ced4da; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 안전관리실 통합 자료실 및 스마트 검색 시스템</h1>
    
    <div class="search-box">
        <select id="deptSelect">
            <option value="all">전체 팀 카테고리</option>
            <option value="경산안전팀">경산안전팀</option>
            <option value="서부안전팀">서부안전팀</option>
            <option value="북부안전팀">북부안전팀</option>
            <option value="수성안전팀">수성안전팀</option>
            <option value="배관진단팀">배관진단팀</option>
        </select>
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요. (예: 북부안전팀 차량, 서부안전팀 정압기 등)">
        <button onclick="searchData()">🔍 통합 검색 및 분석</button>
    </div>

    <div id="statsReportContainer" class="stats-report-container">
        <h3 id="statsTitle" class="stats-title">📊 스마트 통계 분석 결과</h3>
        <div class="stats-grid">
            <div class="stats-table-box">
                <table class="mini-table">
                    <thead id="statsTableHead">
                        </thead>
                    <tbody id="statsTableBody">
                        </tbody>
                </table>
            </div>
            <div class="stats-chart-box">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th style="width: 15%;">담당 부서</th>
                <th style="width: 30%;">자료 및 현황 항목명</th>
                <th style="width: 42%;">상세 내용 설명 (통합 PDF 가이드 수록)</th>
                <th style="width: 13%;">자료 보기</th>
            </tr>
        </thead>
        <tbody id="dataTableBody">
            </tbody>
    </table>

    <div id="pdfViewerContainer" class="pdf-viewer-container">
        <h3 id="pdfTitle">📄 자료 미리보기</h3>
        <iframe id="pdfFrame" src=""></iframe>
    </div>
</div>

<script>
    // 💡 [실제 데이터 기입처 1] 5개 팀의 기본 리스트 데이터 정의
    // ✏️ 아래 content 내용을 실제 PDF에 맞게 수정해 주시면 사이트에 그대로 반영됩니다!
    const safetyDatabase = [
        { dept: "경산안전팀", title: "경산안전팀 관할 시설 및 장비 현황", content: "통합 가이드 문서 수록 - 경산 지역 일상점검 및 정압기 관리 현황 데이터", fileName: "safety_guide.pdf" },
        { dept: "서부안전팀", title: "서부안전팀 시설 및 정압기 점검 내역", content: "통합 가이드 문서 수록 - 서부 관할 다수의 정압기 인프라 현황 데이터", fileName: "safety_guide.pdf" },
        { dept: "북부안전팀", title: "북부안전팀 업무용 차량 및 시설 현황 보고서", content: "통합 가이드 문서 수록 - 일상점검 차량 총 10대에 대한 세부 통계 리포트", fileName: "safety_guide.pdf" },
        { dept: "수성안전팀", title: "수성안전팀 안전관리 지표 및 장비 명세", content: "통합 가이드 문서 수록 - 수성구 관할 공급 시설 및 인프라 통계 현황", fileName: "safety_guide.pdf" },
        { dept: "배관진단팀", title: "배관진단팀 정밀 진단 장비 및 실적 현황", content: "통합 가이드 문서 수록 - 주요 고압/중압 배관 진단 실적 및 보유 장비 분석", fileName: "safety_guide.pdf" }
    ];

    // 📊 [실제 데이터 기입처 2] 검색창에 입력 시 튀어나올 '진짜 통계 수치'를 적는 곳입니다.
    // ✏️ PDF 파일 열어두시고 아래 숫자(count)와 상세행(rows)의 텍스트들을 실제 수치로 변경해 주세요!
    const teamAnalyticsData = {
        "경산안전팀": {
            title: "⚙️ [경산안전팀] 실시간 시설 관리 통계 분석",
            headers: ["구분 항목", "상세 설명", "수량", "비고"],
            rows: [
                ["정압기", "경산 관할 구역", "15개소", "정상 작동"], // ✏️ 실제 숫자로 변경 가능
                ["기타 장비", "안전 장비", "20대", "이상 없음"]
            ],
            totalRow: ["총 계", "종합 인프라", "35개", "안전점검 완료"],
            chartType: "pie",
            labels: ["정압기", "기타 장비"],
            counts: [15, 20], // ✏️ 차트에 그려질 실제 숫자
            colors: ["#20c997", "#6c757d"]
        },
        "서부안전팀": {
            title: "⚙️ [서부안전팀] 관할 대규모 정압기 인프라 통계 분석",
            headers: ["점검 대상 정압기", "관리 등급", "보유 대수", "상태 요약"],
            rows: [
                ["A타입 정압기", "주요 간선 지역", "45대", "정상 가동 중"], // ✏️ 실제 수치로 변경
                ["B타입 정압기", "일반 공급 구역", "32대", "정기 점검중"]
            ],
            totalRow: ["총 계", "정압기 시설 총합", "77대", "안전 최우수 등급 유지"],
            chartType: "bar",
            labels: ["A타입 정압기", "B타입 정압기"],
            counts: [45, 32], // ✏️ 실제 수치로 변경
            colors: ["#fd7e14", "#ffc107"]
        },
        "북부안전팀": {
            title: "🚖 [북부안전팀] 업무용 차량 대수 및 차종 분포 분석 (PDF 데이터)",
            headers: ["차량 종류", "운행 구분", "보유 대수", "차량 번호 예시"],
            rows: [
                ["코나", "일상점검", "5대", "178나7958, 296오7056 등"],
                ["코나 하이브리드", "일상점검", "3대", "281고3858, 281고3882 등"],
                ["아반떼", "일상점검", "2대", "22부5910, 399더6410"]
            ],
            totalRow: ["총 계", "일상점검 총합", "10대", "북부안전팀 차량 운행 정상"],
            chartType: "doughnut",
            labels: ["코나", "코나 하이브리드", "아반떼"],
            counts: [5, 3, 2],
            colors: ["#0dcaf0", "#0d6efd", "#6c757d"]
        },
        "수성안전팀": {
            title: "⚙️ [수성안전팀] 정압기 및 안전 관리 시설 분포",
            headers: ["인프라 종류", "담당 구역", "보유 현황", "점검 주기"],
            rows: [
                ["지구 정압기", "수성구 일대", "28대", "매일 점검"], // ✏️ 실제 수치로 변경
                ["지역 정압기", "아파트 및 주거단지", "54대", "주간 점검"]
            ],
            totalRow: ["총 계", "수성 관할 전체", "82대", "100% 정상 작동"],
            chartType: "pie",
            labels: ["지구 정압기", "지역 정압기"],
            counts: [28, 54], // ✏️ 실제 수치로 변경
            colors: ["#0d6efd", "#a3cfbb"]
        },
        "배관진단팀": {
            title: "🔍 [배관진단팀] 배관 정밀 점검 및 진단 장비 현황",
            headers: ["진단 장비명", "주요 용도", "보유 대수", "장비 상태"],
            rows: [
                ["피그(Piging) 장비", "배관 내부 검사", "3대", "최신형 보유"], // ✏️ 실제 수치로 변경
                ["누출 탐지기", "가스 누출 정밀 진단", "12대", "교정 완료"]
            ],
            totalRow: ["총 계", "정밀 장비 총합", "15대", "가동률 100%"],
            chartType: "bar",
            labels: ["피그 장비", "누출 탐지기"],
            counts: [3, 12], // ✏️ 실제 수치로 변경
            colors: ["#6f42c1", "#e83e8c"]
        }
    };

    let chartInstance = null;

    function getDeptBadgeClass(dept) {
        if (dept === "경산안전팀") return "bg-team1";
        if (dept === "서부안전팀") return "bg-team2";
        if (dept === "북부안전팀") return "bg-team3";
        if (dept === "수성안전팀") return "bg-team4";
        if (dept === "배관진단팀") return "bg-team5";
        return "bg-secondary";
    }

    function displayData(dataList) {
        const tableBody = document.getElementById("dataTableBody");
        tableBody.innerHTML = "";
        
        if (dataList.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999; padding:40px;">🔍 검색 조건과 일치하는 팀 자료 항목이 없습니다.</td></tr>`;
            return;
        }

        dataList.forEach(item => {
            const badgeClass = getDeptBadgeClass(item.dept);
            tableBody.innerHTML += `<tr>
                <td><span class="badge ${badgeClass}">${item.dept}</span></td>
                <td><strong>${item.title}</strong></td>
                <td>${item.content}</td>
                <td><button class="view-btn" onclick="openPdf('${item.fileName}', '${item.title}')">문서 열기 👁️</button></td>
            </tr>`;
        });
    }

    // 🔍 똑똑해진 다차원 검색 매칭 엔진 (버그 수정 완료)
    function searchData() {
        const selectedDept = document.getElementById("deptSelect").value;
        const searchKeyword = document.getElementById("searchInput").value.toLowerCase().trim();
        const reportContainer = document.getElementById("statsReportContainer");

        let activeTeam = null;
        
        // 1. 선택 박스 선택 기준을 최우선으로 하되, 검색어 키워드와 정밀 매칭
        if (selectedDept !== "all") {
            activeTeam = selectedDept;
        } else if (searchKeyword !== "") {
            if (searchKeyword.includes("경산")) activeTeam = "경산안전팀";
            else if (searchKeyword.includes("서부") || searchKeyword.includes("정압기")) activeTeam = "서부안전팀";
            else if (searchKeyword.includes("북부") || searchKeyword.includes("차량") || searchKeyword.includes("차")) activeTeam = "북부안전팀";
            else if (searchKeyword.includes("수성")) activeTeam = "수성안전팀";
            else if (searchKeyword.includes("배관") || searchKeyword.includes("진단")) activeTeam = "배관진단팀";
        }

        // 2. 검색어가 비어있지 않고 올바른 팀이 감지되었을 때만 통계 그래프 활성화
        if (activeTeam && teamAnalyticsData[activeTeam] && searchKeyword !== "") {
            const tData = teamAnalyticsData[activeTeam];
            reportContainer.style.display = "block";
            document.getElementById("statsTitle").innerText = tData.title;

            const thBox = document.getElementById("statsTableHead");
            thBox.innerHTML = `<tr>${tData.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

            const tbBox = document.getElementById("statsTableBody");
            tbBox.innerHTML = tData.rows.map(r => `<tr>${r.map(td => `<td>${td}</td>`).join('')}</tr>`).join('');
            tbBox.innerHTML += `<tr class="highlight-tr">${tData.totalRow.map(td => `<td>${td}</td>`).join('')}</tr>`;

            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if (chartInstance) { chartInstance.destroy(); }

            chartInstance = new Chart(ctx, {
                type: tData.chartType,
                data: {
                    labels: tData.labels,
                    datasets: [{
                        data: tData.counts,
                        backgroundColor: tData.colors,
                        label: '보유 수량'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: tData.chartType === 'bar' ? 'none' : 'right' } 
                    }
                }
            });
        } else {
            // 아무것도 안 쳤거나 매칭 안 되면 상단 통계 리포트 창 가림
            reportContainer.style.display = "none";
        }

        // 3. 하단 메인 리스트 테이블 필터링
        const filteredData = safetyDatabase.filter(item => {
            const matchDept = (selectedDept === "all" || item.dept === selectedDept);
            const matchKeyword = searchKeyword === "" || 
                                 item.dept.toLowerCase().includes(searchKeyword) || 
                                 item.title.toLowerCase().includes(searchKeyword) || 
                                 item.content.toLowerCase().includes(searchKeyword);
            return matchDept && matchKeyword;
        });
        displayData(filteredData);
    }

    function openPdf(fileName, title) {
        const container = document.getElementById("pdfViewerContainer");
        const frame = document.getElementById("pdfFrame");
        document.getElementById("pdfTitle").innerText = `📄 통합 PDF 문서 열람: ${title}`;
        frame.src = fileName;
        container.style.display = "block";
        container.scrollIntoView({ behavior: 'smooth' });
    }

    // 첫 실행 트리거
    window.onload = function() {
        displayData(safetyDatabase);
    };
</script>

</body>
</html>
